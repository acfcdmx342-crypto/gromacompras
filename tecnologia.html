<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitud de Tecnología</title>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.card { border: 1px solid #ccc; padding: 20px; max-width:400px; margin-bottom:20px; }
input, select { width: 100%; padding: 8px; margin-top: 8px; margin-bottom: 12px; }
button { padding: 10px; cursor: pointer; }
table { width: 100%; border-collapse: collapse; margin-top: 30px; }
th, td { border: 1px solid #ccc; padding: 8px; }
th { background: #f0f0f0; }
img { width: 22px; cursor: pointer; margin-right: 8px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
emailjs.init("0aHlArLgvHrj2Xbk8");
</script>

</head>
<body>

<h2>Solicitud de Tecnología</h2>

<!-- BOTÓN CERRAR SESIÓN -->
<div style="text-align:right; margin-bottom: 15px;">
    <button onclick="cerrarSesion()" 
            style="padding:10px 18px; background:#d9534f; color:white; border:none; border-radius:6px; cursor:pointer;">
        🚪 Cerrar sesión
    </button>
</div>

<!-- BOTÓN USUARIOS (CONTROLADO POR PUESTO) -->
<button id="btnUsuarios" onclick="validarAccesoRegistro()">Usuarios</button>

<div class="card">
    <select id="zona">
        <option value="">Seleccione zona</option>
        <option>Norte</option>
        <option>Sur</option>
        <option>Este</option>
        <option>Oeste</option>
    </select>

    <select id="empresa">
        <option value="">Seleccione empresa</option>
        <option>Empresa A</option>
        <option>Empresa B</option>
        <option>Empresa C</option>
    </select>

    <input id="solicita" placeholder="Quién solicita">
    <input id="sucursal" placeholder="Para qué sucursal">
    <input id="fecha" type="date">

    <!-- SUBIR ARCHIVO -->
    <input type="file" id="archivo">

    <button onclick="guardarSolicitud()">Guardar solicitud</button>
</div>

<h3>Solicitudes registradas</h3>
<table>
<thead>
<tr>
    <th>Zona</th>
    <th>Empresa</th>
    <th>Solicita</th>
    <th>Sucursal</th>
    <th>Fecha</th>
    <th>Archivo</th>
    <th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>


<script>
/* ───────────────────────────────────────────────
   VALIDAR PUESTO → CONTROLAR BOTÓN USUARIOS
─────────────────────────────────────────────── */
const puestosPermitidos = [
    "JEFE DE INFRA ESTRUCTURA",
    "COORDINADOR DE SOPORTE TECNICO",
    "SOPORTE TECNICO",
    "GERENTE DE SISTEMAS"
];

const usuarioActivo = JSON.parse(localStorage.getItem("usuarioActivo"));
const btnUsuarios = document.getElementById("btnUsuarios");

// Si NO está logueado → sacar
if (!usuarioActivo) {
    alert("Acceso no autorizado");
    window.location.href = "index.html";
}

// Controlar visibilidad del botón
const puesto = usuarioActivo.puesto?.toUpperCase().trim();
if (!puestosPermitidos.includes(puesto)) {
    btnUsuarios.style.display = "none";
}

// Función al hacer clic en Usuarios
function validarAccesoRegistro() {
    if (!puestosPermitidos.includes(puesto)) {
        alert("No tienes permisos para entrar a la página de usuarios.");
        return;
    }
    window.location.href = "tabla.html";
}

/* ───────────────────────────────────────────────
   CERRAR SESIÓN
─────────────────────────────────────────────── */
function cerrarSesion() {
    sessionStorage.clear();
    localStorage.removeItem("usuarioActivo");

    alert("Sesión cerrada correctamente");
    window.location.href = "index.html";
}

/* ───────────────────────────────────────────────
   CARGAR SOLICITUDES
─────────────────────────────────────────────── */
function cargarSolicitudes() {
    const datos = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const tabla = document.getElementById("tabla");
    tabla.innerHTML = "";

    datos.forEach((s, i) => {
        const urlSeguimiento = `seguimiento.html?empresa=${encodeURIComponent(s.empresa)}
            &zona=${encodeURIComponent(s.zona)}
            &solicita=${encodeURIComponent(s.solicita)}
            &sucursal=${encodeURIComponent(s.sucursal)}
            &fecha=${encodeURIComponent(s.fecha)}
            &archivo=${encodeURIComponent(s.archivoData)}`;

        tabla.innerHTML += `
            <tr>
                <td>${s.zona}</td>
                <td>${s.empresa}</td>
                <td>${s.solicita}</td>
                <td>${s.sucursal}</td>
                <td>${s.fecha}</td>

                <td>
                    ${s.archivoNombre 
                        ? `<a href="${s.archivoData}" download="${s.archivoNombre}">${s.archivoNombre}</a>`
                        : "Sin archivo"}
                </td>

                <td>
                    <img src="https://cdn-icons-png.flaticon.com/512/1828/1828911.png" title="Editar" onclick="editar(${i})">
                    <img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png" title="Eliminar" onclick="eliminar(${i})">
                    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" title="Reenviar" onclick="reenviar(${i})">
                    <a href="${urlSeguimiento}">
                        <img src="https://cdn-icons-png.flaticon.com/512/709/709612.png" title="Seguimiento">
                    </a>
                </td>
            </tr>
        `;
    });
}

/* ───────────────────────────────────────────────
   GUARDAR SOLICITUD
─────────────────────────────────────────────── */
function guardarSolicitud() {
    const zona = document.getElementById("zona").value;
    const empresa = document.getElementById("empresa").value;
    const solicita = document.getElementById("solicita").value;
    const sucursal = document.getElementById("sucursal").value;
    const fecha = document.getElementById("fecha").value;
    const fileInput = document.getElementById("archivo");

    if (!zona || !empresa || !solicita || !sucursal || !fecha) {
        alert("Todos los campos son obligatorios");
        return;
    }

    let archivoNombre = "";
    let archivoData = "";

    const file = fileInput.files[0];

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            archivoData = e.target.result;
            archivoNombre = file.name;
            guardarFinal(zona, empresa, solicita, sucursal, fecha, archivoNombre, archivoData);
        };
        reader.readAsDataURL(file);
    } else {
        guardarFinal(zona, empresa, solicita, sucursal, fecha, "", "");
    }
}

function guardarFinal(zona, empresa, solicita, sucursal, fecha, archivoNombre, archivoData) {
    const datos = JSON.parse(localStorage.getItem("solicitudes") || "[]");

    const nueva = {
        zona, empresa, solicita, sucursal, fecha,
        archivoNombre, archivoData
    };

    datos.push(nueva);
    localStorage.setItem("solicitudes", JSON.stringify(datos));

    emailjs.send("service_mya4ogg", "template_apg1whs", {
        zona, empresa, solicita, sucursal, fecha,
        archivo: archivoNombre
    });

    alert("Solicitud guardada.");
    cargarSolicitudes();
}

/* ───────────────────────────────────────────────
   ELIMINAR
─────────────────────────────────────────────── */
function eliminar(i) {
    const datos = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    datos.splice(i, 1);
    localStorage.setItem("solicitudes", JSON.stringify(datos));
    cargarSolicitudes();
}

/* ───────────────────────────────────────────────
   EDITAR
─────────────────────────────────────────────── */
function editar(i) {
    const datos = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const s = datos[i];

    document.getElementById("zona").value = s.zona;
    document.getElementById("empresa").value = s.empresa;
    document.getElementById("solicita").value = s.solicita;
    document.getElementById("sucursal").value = s.sucursal;
    document.getElementById("fecha").value = s.fecha;

    eliminar(i);
}

/* ───────────────────────────────────────────────
   REENVIAR
─────────────────────────────────────────────── */
function reenviar(i) {
    const datos = JSON.parse(localStorage.getItem("solicitudes") || "[]");
    const s = datos[i];

    emailjs.send("service_mya4ogg", "template_apg1whs", {
        zona: s.zona,
        empresa: s.empresa,
        solicita: s.solicita,
        sucursal: s.sucursal,
        fecha: s.fecha
    })
    .then(() => alert("Solicitud reenviada correctamente."))
    .catch(() => alert("Error al reenviar."));
}

cargarSolicitudes();
</script>

</body>
</html>
