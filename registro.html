<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<h2 style="text-align:center;">Registro de Usuario</h2>
<div class="card">
    <input id="nombre" placeholder="Nombre completo" oninput="toUpper(this)">
    <input id="usuario" placeholder="Usuario" oninput="toUpper(this)">
    <div class="pass-container">
        <input id="pass" type="password" placeholder="Contraseña (mínimo 6 caracteres)" oninput="checkStrength()">
        <span class="pass-toggle" onclick="togglePass()">👁</span>
    </div>
    <div class="strength-bar"><div id="strength" class="strength"></div></div>
    <input id="correo" placeholder="Correo">
    <input id="telefono" placeholder="WhatsApp (10 dígitos)" maxlength="10">
    <select id="puesto">
        <option>Administrador</option>
        <option>Coordinador de soporte</option>
        <option>Sistemas</option>
        <option>Empleado</option>
        <option>Otro</option>
    </select>
    <label>Zonas:</label>
    <select id="zona"></select>
    <label>Empresas:</label>
    <select id="empresa"></select>
    <button onclick="registrar()">Registrar</button>
    <button class="btn-red" onclick="window.location.href='index.html'">Salir</button>
</div>
<script src="js/registro.js"></script>
</body>
</html>
